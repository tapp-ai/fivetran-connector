# CI for the Conversion Fivetran connector.
#
# NOTE: GitHub only runs workflows from `.github/workflows` at a repository
# root. This file is positioned so it works once the connector is published to
# its own repository (it does not run while the connector lives inside the
# parent monorepo).
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --extra dev
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Test
        run: uv run pytest
